<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Single Petal</title>
  <style>
    body {
      margin: 0; background: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
<svg width="500" height="430" viewBox="0 0 130 112">
  <defs>
    <radialGradient id="g" cx="50%" cy="88%" r="80%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff2e8"/>
      <stop offset="12%"  stop-color="#e83040"/>
      <stop offset="55%"  stop-color="#b81828"/>
      <stop offset="100%" stop-color="#780810"/>
    </radialGradient>
    <radialGradient id="sheen" cx="35%" cy="28%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,220,220,.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="rgba(60,0,10,.28)"/>
    </filter>
  </defs>

  <!-- Main petal -->
  <path d="M 65,106
           C 38,98  6,78  3,52
           C 0,28  16,6  35,6
           C 46,4  54,14  65,26
           C 76,14  84,4  95,6
           C 114,6  130,28  127,52
           C 124,78  92,98  65,106 Z"
        fill="url(#g)" filter="url(#shadow)"/>

  <!-- Sheen highlight -->
  <path d="M 65,106
           C 38,98  6,78  3,52
           C 0,28  16,6  35,6
           C 46,4  54,14  65,26
           C 76,14  84,4  95,6
           C 114,6  130,28  127,52
           C 124,78  92,98  65,106 Z"
        fill="url(#sheen)"/>

  <!-- Veins -->
  <g stroke="rgba(80,0,12,.13)" stroke-width=".9" fill="none" stroke-linecap="round">
    <path d="M65,104 Q64,72 60,42 Q57,22 50,10"/>
    <path d="M65,100 Q70,70 78,46 Q86,26 95,12"/>
    <path d="M65,98  Q75,68 88,46 Q100,28 112,16"/>
    <path d="M65,100 Q60,70 52,46 Q44,26 35,12"/>
    <path d="M65,98  Q55,68 42,46 Q30,28 18,16"/>
    <path d="M78,50  Q90,44 100,42"/>
    <path d="M72,34  Q82,28  92,26"/>
    <path d="M52,50  Q40,44  30,42"/>
    <path d="M58,34  Q48,28  38,26"/>
    <path d="M88,50  Q96,52 106,58"/>
    <path d="M42,50  Q34,52  24,58"/>
  </g>

  <!-- Cream base highlight -->
  <ellipse cx="65" cy="98" rx="11" ry="7.5" fill="rgba(255,242,228,.6)"/>
</svg>
</body>
</html>
