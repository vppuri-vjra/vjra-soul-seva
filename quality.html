<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Source Nature — Quality Deep Dive</title>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    /* ── Quality Hero ── */
    .quality-hero {
      padding: 80px 24px 56px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .quality-num {
      font-family: 'Arial', sans-serif;
      font-size: .72rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-bottom: 16px;
    }
    .quality-icon { font-size: 3.5rem; margin-bottom: 16px; display: block; }
    .quality-hero h1 {
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 400; letter-spacing: .03em;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 14px;
    }
    .quality-tagline {
      font-style: italic; color: var(--text-dim);
      font-size: 1.08rem; max-width: 560px; margin: 0 auto 32px;
    }
    .quality-accent-bar {
      width: 120px; height: 3px; margin: 0 auto 40px;
      border-radius: 2px;
    }
    .quality-overview {
      max-width: 720px; margin: 0 auto;
      font-size: 1.05rem; color: var(--text);
      line-height: 1.85;
    }

    /* ── Sections ── */
    .sections-wrapper {
      padding: 64px 0;
    }
    .science-section {
      background: var(--bg-card);
      border: 1px solid rgba(201,168,76,.10);
      border-radius: 16px;
      padding: 40px 36px;
      margin-bottom: 28px;
      position: relative; overflow: hidden;
    }
    .science-section::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .science-section h2 {
      font-size: 1.22rem; font-weight: 400;
      color: var(--gold-light); margin-bottom: 14px;
    }
    .science-section .body-text {
      color: var(--text-dim); font-size: .95rem;
      line-height: 1.8; margin-bottom: 22px;
      font-style: italic;
    }
    .science-section ul {
      list-style: none; padding: 0;
    }
    .science-section ul li {
      padding: 10px 0 10px 22px;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,.05);
      font-size: .92rem; color: var(--text);
      line-height: 1.65;
    }
    .science-section ul li:last-child { border-bottom: none; }
    .science-section ul li::before {
      content: '›'; position: absolute; left: 0;
      color: var(--gold); font-size: 1.1rem; top: 9px;
    }

    /* ── Practices ── */
    .practices-section {
      background: rgba(201,168,76,.05);
      border: 1px solid rgba(201,168,76,.18);
      border-radius: 16px;
      padding: 40px 36px;
      margin-bottom: 28px;
    }
    .practices-section h2 {
      font-size: 1.1rem; font-weight: 400;
      color: var(--gold); margin-bottom: 22px;
      font-family: 'Arial', sans-serif;
      letter-spacing: .08em; text-transform: uppercase;
      font-size: .8rem;
    }
    .practice-item {
      display: flex; gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(201,168,76,.10);
    }
    .practice-item:last-child { border-bottom: none; }
    .practice-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(201,168,76,.15);
      border: 1px solid rgba(201,168,76,.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Arial', sans-serif; font-size: .75rem;
      color: var(--gold); margin-top: 2px;
    }
    .practice-text { font-size: .92rem; color: var(--text); line-height: 1.65; }

    /* ── Citations ── */
    .citations-section {
      padding: 32px 0 16px;
    }
    .citations-section h3 {
      font-family: 'Arial', sans-serif;
      font-size: .72rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-bottom: 16px;
    }
    .citations-section ol {
      padding-left: 20px;
    }
    .citations-section li {
      font-size: .82rem; color: var(--text-dim);
      padding: 5px 0; line-height: 1.55;
    }

    /* ── Navigation ── */
    .quality-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 48px 0;
      border-top: 1px solid rgba(255,255,255,.06);
      gap: 16px;
    }
    .quality-nav a {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text-dim);
      font-size: .88rem; padding: 14px 20px;
      border: 1px solid rgba(201,168,76,.12);
      border-radius: 12px;
      transition: all .2s;
    }
    .quality-nav a:hover {
      color: var(--gold-light);
      border-color: rgba(201,168,76,.3);
      background: rgba(201,168,76,.05);
    }
    .quality-nav .nav-label {
      font-family: 'Arial', sans-serif;
      font-size: .68rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--gold-dim);
      display: block; margin-bottom: 2px;
    }
    .quality-nav .nav-name { color: var(--text); font-size: .9rem; }
    .quality-nav a.prev { flex-direction: row; }
    .quality-nav a.next { flex-direction: row-reverse; text-align: right; }
    .quality-nav .spacer { flex: 1; }

    /* ── Back to overview ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--gold-dim); text-decoration: none;
      font-family: 'Arial', sans-serif; font-size: .78rem;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 10px 0; transition: color .2s;
    }
    .back-link:hover { color: var(--gold-light); }

    /* ── Section counter label ── */
    .section-counter {
      font-family: 'Arial', sans-serif;
      font-size: .68rem; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .science-section, .practices-section { padding: 28px 20px; }
      .quality-nav { flex-direction: column; }
      .quality-nav a { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Nav injected by JS -->
<div id="nav-container"></div>

<main>
  <div class="container">
    <div style="padding-top: 32px;">
      <a href="index.html" class="back-link">← All 10 Qualities</a>
    </div>

    <!-- Hero -->
    <div class="quality-hero" id="quality-hero"></div>

    <!-- Science sections -->
    <div class="sections-wrapper" id="sections-wrapper"></div>

    <!-- Bottom nav -->
    <div class="quality-nav" id="quality-nav"></div>
  </div>
</main>

<footer>
  <div class="container">
    <p><span>Source Nature · 10 Greatest Qualities</span><br>
    Ancient wisdom confirmed by modern science.</p>
  </div>
</footer>

<script src="js/qualities-data.js"></script>
<script src="js/nav.js"></script>
<script>
  // Render nav
  document.getElementById('nav-container').innerHTML = buildNav();

  // Get quality from URL param
  const params = new URLSearchParams(window.location.search);
  const qid = params.get('q') || 'love';
  const q = QUALITIES.find(x => x.id === qid) || QUALITIES[0];
  const idx = QUALITIES.indexOf(q);

  // Update page title
  document.title = `Source Nature — ${q.name}`;

  // Mark active nav item
  document.querySelectorAll('.nav-q').forEach(el => {
    if (el.dataset.id === q.id) el.classList.add('active');
  });

  // Hero
  document.getElementById('quality-hero').innerHTML = `
    <p class="quality-num">Quality ${q.num} of 10</p>
    <span class="quality-icon">${q.icon}</span>
    <h1>${q.name}</h1>
    <p class="quality-tagline">"${q.tagline}"</p>
    <div class="quality-accent-bar" style="background: linear-gradient(90deg, ${q.color1}, ${q.color2})"></div>
    <p class="quality-overview">${q.overview}</p>
  `;

  // Science sections
  const sectionsEl = document.getElementById('sections-wrapper');
  let sectionsHTML = '';
  q.sections.forEach((sec, i) => {
    sectionsHTML += `
      <div class="science-section" style="--accent: ${q.color1}">
        <style>.science-section:nth-of-type(${i+1})::before { background: linear-gradient(180deg, ${q.color1}, ${q.color2}); }</style>
        <p class="section-counter">Section ${i+1} of ${q.sections.length}</p>
        <h2>${sec.title}</h2>
        <p class="body-text">${sec.body}</p>
        <ul>
          ${sec.points.map(p => `<li>${p}</li>`).join('')}
        </ul>
      </div>
    `;
  });

  // Practices
  sectionsHTML += `
    <div class="practices-section">
      <h2>🧘 How to Cultivate This Quality</h2>
      ${q.practices.map((p, i) => `
        <div class="practice-item">
          <div class="practice-num">${i+1}</div>
          <p class="practice-text">${p}</p>
        </div>
      `).join('')}
    </div>
  `;

  // Citations
  sectionsHTML += `
    <div class="citations-section">
      <h3>Key Research References</h3>
      <ol>
        ${q.citations.map(c => `<li>${c}</li>`).join('')}
      </ol>
    </div>
  `;

  sectionsEl.innerHTML = sectionsHTML;

  // Prev / Next navigation
  const prev = idx > 0 ? QUALITIES[idx - 1] : null;
  const next = idx < QUALITIES.length - 1 ? QUALITIES[idx + 1] : null;

  let navHTML = '';
  if (prev) {
    navHTML += `
      <a href="quality.html?q=${prev.id}" class="prev">
        <span style="font-size:1.4rem">←</span>
        <span>
          <span class="nav-label">Previous</span>
          <span class="nav-name">${prev.icon} ${prev.name}</span>
        </span>
      </a>`;
  } else {
    navHTML += `<div></div>`;
  }

  navHTML += `<div class="spacer"></div>`;

  if (next) {
    navHTML += `
      <a href="quality.html?q=${next.id}" class="next">
        <span style="font-size:1.4rem">→</span>
        <span>
          <span class="nav-label">Next</span>
          <span class="nav-name">${next.icon} ${next.name}</span>
        </span>
      </a>`;
  } else {
    navHTML += `<div></div>`;
  }

  document.getElementById('quality-nav').innerHTML = navHTML;
</script>
</body>
</html>
